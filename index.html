<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>КиноКлуб | Рекомендации отдела</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            margin: 0;
            padding: 16px;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Модальное окно имени */
        .name-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .name-modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 32px 24px;
            border-radius: 32px;
            text-align: center;
            width: 300px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .name-modal-content h3 {
            color: #ffd700;
            margin-bottom: 20px;
        }
        .name-modal-content input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            text-align: center;
            border: 2px solid #ffd700;
            border-radius: 16px;
            background: rgba(0,0,0,0.5);
            color: white;
            margin: 16px 0;
        }
        .name-modal-content button {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .main-content {
            display: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 32px;
            margin: 0;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sync-status {
            font-size: 11px;
            color: #00b894;
            margin-top: 8px;
        }
        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 40px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .change-name-btn {
            background: none;
            border: none;
            color: #ffd700;
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 60px;
        }
        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        .card {
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #ffd700;
        }

        .add-form input, .add-form select, .add-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 14px;
        }
        .add-form button {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .movie-item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .movie-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
        }
        .movie-genre {
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .movie-author {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .movie-comment {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }
        .rating-stars {
            display: flex;
            gap: 5px;
            align-items: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .star {
            font-size: 24px;
            cursor: pointer;
            color: #555;
            transition: all 0.1s;
        }
        .star.active {
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }
        .average-rating {
            font-size: 13px;
            color: #ffd700;
            margin-left: 10px;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(255,215,0,0.1);
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ff7675;
            cursor: pointer;
            font-size: 14px;
            float: right;
        }
        .empty-message {
            text-align: center;
            color: #aaa;
            padding: 40px;
        }
        .notification-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #ffd700;
            color: #1a1a2e;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            transform: translateY(100px);
            transition: transform 0.3s ease;
            z-index: 1500;
            font-weight: bold;
        }
        .notification-bar.show {
            transform: translateY(0);
        }

        /* Модальное окно для списка оценок */
        .ratings-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .ratings-popup-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 24px;
            padding: 24px;
            max-width: 320px;
            width: 90%;
            border: 1px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        .ratings-popup h3 {
            color: #ffd700;
            margin-top: 0;
            text-align: center;
        }
        .ratings-list {
            margin: 16px 0;
        }
        .rating-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .rating-user {
            font-weight: bold;
            color: #fff;
        }
        .rating-stars-small {
            color: #ffd700;
            font-size: 14px;
            letter-spacing: 2px;
        }
        .close-popup-btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
        }

        /* Стили для комментариев */
        .comment-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .comment-title {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .comment-list {
            margin-bottom: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .comment-item {
            font-size: 12px;
            color: #ccc;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }
        .comment-content {
            flex: 1;
        }
        .comment-author {
            color: #ffd700;
            font-weight: bold;
        }
        .comment-time {
            font-size: 10px;
            color: #666;
            margin-left: 8px;
        }
        .comment-text {
            margin-top: 3px;
            word-break: break-word;
        }
        .comment-delete {
            background: none;
            border: none;
            color: #ff7675;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            opacity: 0.6;
        }
        .comment-delete:hover {
            opacity: 1;
        }
        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .comment-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 25px;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 12px;
        }
        .comment-input button {
            background: #ffd700;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="nameModal" class="name-modal">
    <div class="name-modal-content">
        <div style="font-size: 48px;">🎬</div>
        <h3>Добро пожаловать в КиноКлуб!</h3>
        <input type="text" id="userNameInput" placeholder="Ваше имя..." maxlength="30">
        <button onclick="saveUserName()">Войти в клуб</button>
    </div>
</div>

<div id="mainContent" class="container">
    <div class="header">
        <h1>🎬 КиноКлуб</h1>
        <div class="sync-status" id="syncStatus">🔄 Синхронизация...</div>
        <div class="user-info" id="userInfo"></div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn active" data-page="movies">🎬 Фильмы</button>
        <button class="nav-btn" data-page="series">📺 Сериалы</button>
        <button class="nav-btn" data-page="theaters">🎭 Театры</button>
    </div>

    <!-- Фильмы -->
    <div id="moviesPage" class="page active">
        <div class="card add-form">
            <div class="card-title">➕ Предложить фильм</div>
            <input type="text" id="movieTitle" placeholder="Название фильма">
            <select id="movieGenre">
                <option>Боевик</option><option>Комедия</option><option>Драма</option><option>Триллер</option>
                <option>Фантастика</option><option>Ужасы</option><option>Мелодрама</option><option>Детектив</option>
            </select>
            <textarea id="movieComment" placeholder="Почему стоит посмотреть?"></textarea>
            <button onclick="addItem('movie')">✨ Предложить</button>
        </div>
        <div id="moviesList"></div>
    </div>

    <!-- Сериалы -->
    <div id="seriesPage" class="page">
        <div class="card add-form">
            <div class="card-title">➕ Предложить сериал</div>
            <input type="text" id="seriesTitle" placeholder="Название сериала">
            <select id="seriesGenre">
                <option>Боевик</option><option>Комедия</option><option>Драма</option><option>Триллер</option>
                <option>Фантастика</option><option>Ужасы</option><option>Ситком</option>
            </select>
            <textarea id="seriesComment" placeholder="Почему стоит посмотреть?"></textarea>
            <button onclick="addItem('series')">✨ Предложить</button>
        </div>
        <div id="seriesList"></div>
    </div>

    <!-- Театры -->
    <div id="theatersPage" class="page">
        <div class="card add-form">
            <div class="card-title">➕ Предложить спектакль</div>
            <input type="text" id="theaterTitle" placeholder="Название спектакля">
            <select id="theaterGenre">
                <option>Драма</option><option>Комедия</option><option>Мюзикл</option><option>Балет</option>
                <option>Опера</option><option>Современный</option><option>Детский</option>
            </select>
            <textarea id="theaterComment" placeholder="Почему стоит посмотреть?"></textarea>
            <button onclick="addItem('theater')">✨ Предложить</button>
        </div>
        <div id="theatersList"></div>
    </div>
</div>

<!-- Модальное окно для списка оценок -->
<div id="ratingsPopup" class="ratings-popup" onclick="closeRatingsPopup(event)">
    <div class="ratings-popup-content" onclick="event.stopPropagation()">
        <h3>⭐ Кто и как оценил</h3>
        <div id="ratingsList" class="ratings-list"></div>
        <button class="close-popup-btn" onclick="closeRatingsPopup()">Закрыть</button>
    </div>
</div>

<div id="notificationBar" class="notification-bar">
    🔔 <span id="notificationMessage"></span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // ========== ВАШИ ДАННЫЕ ИЗ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCHOezN64WZ5Xa9HxyMT6Xwf-Gx_6CcCX0",
        authDomain: "my-new-projekt1.firebaseapp.com",
        projectId: "my-new-projekt1",
        storageBucket: "my-new-projekt1.firebasestorage.app",
        messagingSenderId: "797468384758",
        appId: "1:797468384758:web:13026a27b851e140793bd7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUserName = localStorage.getItem('kinoClubUserName');
    let movies = [], series = [], theaters = [];

    // Инициализация
    if (currentUserName) {
        document.getElementById('nameModal').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('userInfo').innerHTML = `👤 ${currentUserName} <button class="change-name-btn" onclick="showNameModal()">(сменить)</button>`;
        loadAll();
    }

    function saveUserName() {
        const name = document.getElementById('userNameInput').value.trim();
        if (name) {
            currentUserName = name;
            localStorage.setItem('kinoClubUserName', currentUserName);
            document.getElementById('nameModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('userInfo').innerHTML = `👤 ${currentUserName} <button class="change-name-btn" onclick="showNameModal()">(сменить)</button>`;
            loadAll();
        }
    }

    function showNameModal() {
        document.getElementById('nameModal').style.display = 'flex';
        document.getElementById('userNameInput').value = currentUserName || '';
    }

    function showNotification(msg) {
        const bar = document.getElementById('notificationBar');
        document.getElementById('notificationMessage').textContent = msg;
        bar.classList.add('show');
        setTimeout(() => bar.classList.remove('show'), 2500);
    }

    async function addItem(type) {
        if (!currentUserName) return;
        
        let title, genre, comment;
        if (type === 'movie') {
            title = document.getElementById('movieTitle').value.trim();
            genre = document.getElementById('movieGenre').value;
            comment = document.getElementById('movieComment').value.trim();
            if (!title) { alert('Введите название'); return; }
            document.getElementById('movieTitle').value = '';
            document.getElementById('movieComment').value = '';
        } else if (type === 'series') {
            title = document.getElementById('seriesTitle').value.trim();
            genre = document.getElementById('seriesGenre').value;
            comment = document.getElementById('seriesComment').value.trim();
            if (!title) { alert('Введите название'); return; }
            document.getElementById('seriesTitle').value = '';
            document.getElementById('seriesComment').value = '';
        } else {
            title = document.getElementById('theaterTitle').value.trim();
            genre = document.getElementById('theaterGenre').value;
            comment = document.getElementById('theaterComment').value.trim();
            if (!title) { alert('Введите название'); return; }
            document.getElementById('theaterTitle').value = '';
            document.getElementById('theaterComment').value = '';
        }
        
        try {
            await db.collection(`${type}Recommendations`).add({
                title, genre, comment, author: currentUserName,
                timestamp: Date.now(), ratings: {}, comments: []
            });
            showNotification(`${currentUserName} добавил(а): ${title}`);
        } catch (error) {
            console.error(error);
            showNotification('Ошибка!');
        }
    }

    async function rateItem(type, id, rating) {
        if (!currentUserName) return;
        const docRef = db.collection(`${type}Recommendations`).doc(id);
        const doc = await docRef.get();
        if (doc.exists) {
            const ratings = doc.data().ratings || {};
            if (ratings[currentUserName] === rating) {
                delete ratings[currentUserName];
                showNotification(`${currentUserName} снял(а) оценку ⭐`);
            } else {
                ratings[currentUserName] = rating;
                showNotification(`${currentUserName} оценил(а) на ${rating} ⭐`);
            }
            await docRef.update({ ratings });
        }
    }

    async function addComment(type, id) {
        if (!currentUserName) return;
        const input = document.getElementById(`commentInput_${type}_${id}`);
        const text = input.value.trim();
        if (!text) return;
        
        const docRef = db.collection(`${type}Recommendations`).doc(id);
        const doc = await docRef.get();
        if (doc.exists) {
            const comments = doc.data().comments || [];
            comments.push({
                id: Date.now(),
                author: currentUserName,
                text: text,
                timestamp: Date.now()
            });
            await docRef.update({ comments });
            input.value = '';
            showNotification(`${currentUserName} добавил комментарий 💬`);
        }
    }

    async function deleteComment(type, itemId, commentId) {
        const docRef = db.collection(`${type}Recommendations`).doc(itemId);
        const doc = await docRef.get();
        if (doc.exists) {
            const comments = doc.data().comments || [];
            const comment = comments.find(c => c.id === commentId);
            if (comment && comment.author === currentUserName) {
                const updatedComments = comments.filter(c => c.id !== commentId);
                await docRef.update({ comments: updatedComments });
                showNotification('Комментарий удалён 🗑️');
            } else {
                alert('Удалить можно только свой комментарий');
            }
        }
    }

    async function deleteItem(type, id, author) {
        if (author !== currentUserName) {
            alert('Удалить можно только своё предложение');
            return;
        }
        if (confirm('Удалить это предложение?')) {
            await db.collection(`${type}Recommendations`).doc(id).delete();
            showNotification('Предложение удалено');
        }
    }

    function showRatingsPopup(ratings) {
        const popup = document.getElementById('ratingsPopup');
        const container = document.getElementById('ratingsList');
        
        if (!ratings || Object.keys(ratings).length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">😢 Пока нет оценок</div>';
        } else {
            const sorted = Object.entries(ratings).sort((a, b) => a[0].localeCompare(b[0]));
            container.innerHTML = sorted.map(([name, rating]) => `
                <div class="rating-item">
                    <span class="rating-user">${escapeHtml(name)}</span>
                    <span class="rating-stars-small">${'★'.repeat(rating)}${'☆'.repeat(5-rating)}</span>
                </div>
            `).join('');
        }
        popup.style.display = 'flex';
    }

    function closeRatingsPopup(e) {
        if (!e || e.target === document.getElementById('ratingsPopup') || e.target.classList.contains('close-popup-btn')) {
            document.getElementById('ratingsPopup').style.display = 'none';
        }
    }

    function calculateAverage(ratings) {
        if (!ratings) return 0;
        const values = Object.values(ratings);
        if (values.length === 0) return 0;
        const sum = values.reduce((a, b) => a + b, 0);
        return (sum / values.length).toFixed(1);
    }

    function renderStars(itemId, ratings, type) {
        const userRating = ratings?.[currentUserName] || 0;
        const avgRating = calculateAverage(ratings);
        const ratingCount = ratings ? Object.keys(ratings).length : 0;
        
        let starsHtml = '<div class="rating-stars">';
        for (let i = 1; i <= 5; i++) {
            starsHtml += `<span class="star ${userRating >= i ? 'active' : ''}" onclick="rateItem('${type}', '${itemId}', ${i})">★</span>`;
        }
        starsHtml += `<span class="average-rating" onclick="showRatingsPopup(${JSON.stringify(ratings || {}).replace(/"/g, '&quot;')})">⭐ ${avgRating} (${ratingCount} ${getRatingWord(ratingCount)})</span>`;
        starsHtml += '</div>';
        return starsHtml;
    }

    function getRatingWord(count) {
        if (count % 10 === 1 && count % 100 !== 11) return 'оценка';
        if (count % 10 >= 2 && count % 10 <= 4 && (count % 100 < 10 || count % 100 >= 20)) return 'оценки';
        return 'оценок';
    }

    function formatDate(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function renderComments(comments, type, itemId) {
        if (!comments || comments.length === 0) {
            return '<div style="color:#777; font-size:12px; padding:4px 0;">💬 Нет комментариев. Будьте первым!</div>';
        }
        
        return comments.map(c => `
            <div class="comment-item">
                <div class="comment-content">
                    <span class="comment-author">${escapeHtml(c.author)}</span>
                    <span class="comment-time">${formatDate(c.timestamp)}</span>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
                ${c.author === currentUserName ? `<button class="comment-delete" onclick="deleteComment('${type}', '${itemId}', ${c.id})" title="Удалить комментарий">🗑️</button>` : ''}
            </div>
        `).join('');
    }

    function renderList(containerId, items, type) {
        const container = document.getElementById(containerId);
        if (!items || items.length === 0) {
            container.innerHTML = '<div class="empty-message">🎬 Пока ничего нет. Будьте первым!</div>';
            return;
        }
        
        let html = '';
        items.forEach(item => {
            html += `
                <div class="movie-item">
                    ${item.author === currentUserName ? `<button class="delete-btn" onclick="deleteItem('${type}', '${item.id}', '${item.author}')">🗑️</button>` : ''}
                    <div class="movie-title">${escapeHtml(item.title)}</div>
                    <div class="movie-genre">${escapeHtml(item.genre)}</div>
                    <div class="movie-author">👤 ${escapeHtml(item.author)} • ${new Date(item.timestamp).toLocaleDateString()}</div>
                    ${item.comment ? `<div class="movie-comment">💬 ${escapeHtml(item.comment)}</div>` : ''}
                    ${renderStars(item.id, item.ratings, type)}
                    <div class="comment-section">
                        <div class="comment-title">📝 Комментарии (${item.comments?.length || 0})</div>
                        <div class="comment-list">
                            ${renderComments(item.comments, type, item.id)}
                        </div>
                        <div class="comment-input">
                            <input type="text" id="commentInput_${type}_${item.id}" placeholder="Написать комментарий..." maxlength="200">
                            <button onclick="addComment('${type}', '${item.id}')">💬 Отправить</button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function loadAll() {
        // Фильмы
        db.collection('movieRecommendations').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            movies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList('moviesList', movies, 'movie');
            document.getElementById('syncStatus').textContent = '✅ Синхронизировано';
        }, error => {
            console.error(error);
            document.getElementById('syncStatus').textContent = '⚠️ Ошибка подключения';
        });
        
        // Сериалы
        db.collection('seriesRecommendations').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            series = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList('seriesList', series, 'series');
        });
        
        // Театры
        db.collection('theaterRecommendations').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            theaters = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList('theatersList', theaters, 'theater');
        });
    }

    // Навигация
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`${btn.dataset.page}Page`).classList.add('active');
        });
    });

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m];
        });
    }

    window.addItem = addItem;
    window.rateItem = rateItem;
    window.addComment = addComment;
    window.deleteComment = deleteComment;
    window.deleteItem = deleteItem;
    window.saveUserName = saveUserName;
    window.showNameModal = showNameModal;
    window.showRatingsPopup = showRatingsPopup;
    window.closeRatingsPopup = closeRatingsPopup;
</script>
</body>
</html>
